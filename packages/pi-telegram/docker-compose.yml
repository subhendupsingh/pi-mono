services:
  pi-telegram:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pi-telegram
    restart: always
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - AUTH_JSON=${AUTH_JSON}
      # Note: DATA_DIR and PI_DIR env vars are used for volume mount sources only.
      # Inside the container, paths are always /app/data and /app/.pi
    volumes:
      - ${DATA_DIR:-/opt/pi-telegram/data}:/app/data
      - ${PI_DIR:-/opt/pi-telegram/.pi}:/app/.pi
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - sandbox
    command: ["--sandbox=docker:auto", "./data"]

  sandbox:
    image: alpine:latest
    restart: always
    command: tail -f /dev/null
    labels:
      - "pi.role=sandbox"
    volumes:
      - ${DATA_DIR:-/opt/pi-telegram/data}:/workspace
      - ${PI_DIR:-/opt/pi-telegram/.pi}:/app/.pi
